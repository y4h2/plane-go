[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
markers =
    auth: authentication / session flow
    workspace: workspace endpoints
    project: project + project-member endpoints
    issue: issue endpoints
    cycle: cycle endpoints
    module: module endpoints
    state: state endpoints
    label: label endpoints
    identity: boot/identity endpoints
    issue_detail: issue sub-resources
    issue_social: issue subscribe/reactions
    views: saved views
    user_properties: project user-properties
    estimate: project estimates
    workspace_extras: notifications + favorites
    cycle_module_extras: cycle/module favorites + transfer
    workspace_home: home-page reads
    member_update: project member role update
    analytics: workspace analytics endpoints
    webhooks: workspace webhook endpoints
    api_tokens: user API token endpoints
    intake: intake / triage inbox endpoints
    pages: wiki/docs pages metadata CRUD
    exporter: workspace issue export endpoints
    external: unsplash + AI-assistant integration endpoints
    grouped_boards: cycle/module issue boards group_by sub-envelope
    filters: issue-list filter query params
    boot: boot/first-load reads
    misc_reads: assorted read endpoints
    peek_progress: issue peek + progress reads
    issue_actions: issue archive/bulk/relation actions
    assets: v2 asset upload flow
    search_estimate_archive: search + estimate update/delete + project archive
    issue_extras: draft issues + bulk-update-dates
    archive: cycle + module archive/unarchive endpoints
    user_extras: change-password + account deactivation
    view_extras: user-favorite-views + global-view-issues (cross-project list)
    issue_tail: deleted-issues list + work-item-by-identifier lookup
    module_analytics: module progress counts + distribution/burndown reads
