[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
markers =
    auth: authentication / session flow
    workspace: workspace endpoints
    project: project + project-member endpoints
    issue: issue endpoints
    cycle: cycle endpoints
    module: module endpoints
    state: state endpoints
    label: label endpoints
    identity: boot/identity endpoints
    issue_detail: issue sub-resources
    issue_social: issue subscribe/reactions
    views: saved views
    user_properties: project user-properties
    estimate: project estimates
    workspace_extras: notifications + favorites
    cycle_module_extras: cycle/module favorites + transfer
    workspace_home: home-page reads
    member_update: project member role update
