version: "2"
sql:
  - engine: postgresql
    # sqlc understands goose's "-- +goose Up/Down" markers and reads only the Up
    # statements as the schema.
    schema: internal/db/migrations
    queries: internal/db/queries
    gen:
      go:
        package: gen
        out: internal/db/gen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
        overrides:
          - db_type: uuid
            go_type: github.com/google/uuid.UUID
          - db_type: timestamptz
            go_type: time.Time
          - db_type: timestamptz
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
